# ModernZ configuration
# Docs: https://github.com/Samillion/ModernZ
# Values here mostly match ModernZ defaults but are written out so it is
# clear what is set. Booleans use yes/no.

# --- Layout ---
layout=default

# --- Icons ---
icon_theme=fluent
icon_style=mixed

# --- Seek bar ---
seekbar_height=medium
nibbles_style=gap

# --- Window / title (paired with title-bar=no in mpv.conf) ---
window_top_bar=auto
window_controls=yes
show_title=yes
title=${media-title}

# --- Buttons ---
chapter_skip_buttons=no
playlist_button=yes
speed_button=yes
screenshot_button=no
loop_button=no
shuffle_button=no
ontop_button=no
download_button=no

